global
  log stdout format raw local0
  maxconn 4096

defaults
  log global
  mode http
  option httplog
  option dontlognull
  timeout connect 5s
  timeout client 30s
  timeout server 30s
  retries 3

frontend ecotrack_http
  bind *:80
  http-response set-header X-Forwarded-Proto http
  default_backend ecotrack_api

frontend ecotrack_https
  bind *:443 ssl crt /etc/haproxy/certs/ecotrack.pem alpn h2,http/1.1
  http-response set-header Strict-Transport-Security max-age=31536000;\ includeSubDomains;\ preload
  http-response set-header X-Forwarded-Proto https
  default_backend ecotrack_api

backend ecotrack_api
  balance roundrobin
  option httpchk GET /healthz
  http-check expect status 200
  cookie SERVERID insert indirect nocache
  stick-table type ip size 100k expire 30m
  stick on src
  server api1 127.0.0.1:3001 check inter 2000 rise 2 fall 3 cookie api1
  server api2 127.0.0.1:3002 check inter 2000 rise 2 fall 3 cookie api2
  server api3 127.0.0.1:3003 check inter 2000 rise 2 fall 3 cookie api3

listen stats
  bind *:8404
  mode http
  stats enable
  stats uri /stats
  stats refresh 5s
  stats auth admin:ecotrack
