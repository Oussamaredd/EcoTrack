apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: ecotrack-api-prometheus
  namespace: ecotrack
spec:
  scaleTargetRef:
    name: ecotrack-api
  minReplicaCount: 2
  maxReplicaCount: 10
  cooldownPeriod: 300
  pollingInterval: 30
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus-operated.monitoring.svc.cluster.local:9090
        metricName: ecotrack_http_requests_total
        query: sum(rate(ecotrack_http_requests_total[2m]))
        threshold: "1000"
